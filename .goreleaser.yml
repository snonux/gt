version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gt
    binary: gt
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: snonux
    name: gt
  draft: false
  prerelease: false
  mode: replace
  name_template: "v{{ .Version }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

 Announce:
  enable: false
